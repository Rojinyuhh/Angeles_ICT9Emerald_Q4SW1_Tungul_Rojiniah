<!DOCTYPE html>
<html lang="en">
<head>
  <title>Q4 Seatwork 1</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link href="styles.css" rel="stylesheet">

  <style>
    body{
        background: url(background.png);
        background-size: cover;
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .Login{
        background-color: #1d2f4e;
        width: 550px;
        height: 525px;
        padding: 20px;
        border-radius: 15px;
        box-shadow: 2px 5px 5px #18253b;
        color: whitesmoke;
        overflow: hidden;
    }

    .header{
        background: #18253b;
        padding: 20px;
        margin: -20px -20px -20px -20px;
        text-align: center;
        font-size: 20px;
        font-weight: bold;
    }

    #userInput, #passInput{
        width: 470px;
        height: 40px;
        padding: 5px;
        text-align: center;
        border-radius: 7px;
        display: block;
        margin: 10px auto;
        border: 1px solid black;
    }

    .btn-container{
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-top: 10px;
    }

    .submit-btn{
        width: 200px;
        height: 40px;
        border-radius: 5px;
        border: none;
        background:#18253b;
        color: whitesmoke;
    }

    .clear-btn{
        width: 100px;
        height: 40px;
        border-radius: 5px;
        border: none;
        background: #ede7de;
        color: #18253b;
    }

    h1{
        text-align: center;
    }

    h2{
        font-size: 23px;
    }

    label{
        font-size: 19px;
    }


  </style>

</head>
<body>
    
    <div class="Login">
    <div class="header"><h1>LOGIN FORM</h1></div>
    <br>

    <br><h2>Username</h2>
    <input type="text" id="userInput" placeholder="Enter here"> <br> <br>

    <h2>Password</h2>
    <input type="password" id="passInput" placeholder="*****"> <br>

    <input type="checkbox" id="checkbox">
    <label for="checkbox">Stay logged in</label><br><br>

    <div class="btn-container">
    <button class="submit-btn" onclick="login()">Log In</button>
    <button class="clear-btn" onclick="clearInput()">Clear</button>
    </div>

    </div>

    <script>
        var CorrectUser = "CutestInDaWorld";
        var CorrectPass = "AristotleisGay";

        var attempt = 0;
        var MaxTry = 3;


        function login(){
            var username = document.getElementById("userInput").value;
            var password = document.getElementById("passInput").value;

            if (username === CorrectUser && password === CorrectPass){
                alert("Login Successful! Welcome " + CorrectUser)

            } else{
                attempt++;
                var remaining = MaxTry - attempt;

                if (remaining > 0){
                    alert("Login Failed! You have " + remaining + " " + "attempt(s) left.")
                } else{
                    alert("Account Locked. Too many failed attempts")
                }        
            }
        }

        function clearInput(){
            document.getElementById("userInput").value = "";
            document.getElementById("passInput").value = "";
            document.getElementById("checkbox").checked = false;
        }
    </script>


    <script>
    </script>

</body>
</html>
